name: Deploy to AKS

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "docker/**"
      - "tests/**"
      - "k8s/**"
      - ".github/workflows/deploy-dev.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente a desplegar"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: true

env:
  RESOURCE_GROUP: rg-devops-curso-RE1
  ACR_NAME: webdeploymentprojectre1
  AKS_NAME: web-deployment-project-re1-aks-west
  IMAGE_NAME: azure-web-app

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar ambiente
        shell: bash
        run: |
          DEPLOY_ENV="${{ inputs.environment || 'dev' }}"

          echo "DEPLOY_ENV=$DEPLOY_ENV" >> "$GITHUB_ENV"
          echo "NAMESPACE=web-$DEPLOY_ENV" >> "$GITHUB_ENV"
          echo "MANIFEST_PATH=k8s/$DEPLOY_ENV" >> "$GITHUB_ENV"

          echo "Ambiente seleccionado: $DEPLOY_ENV"
          echo "Namespace: web-$DEPLOY_ENV"
          echo "Ruta de manifiestos: k8s/$DEPLOY_ENV"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Ejecutar pruebas
        run: pytest tests -v

      - name: Iniciar sesión en Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Construir imagen en ACR
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:${{ github.sha }}" \
            --file docker/Dockerfile \
            .

      - name: Obtener credenciales de AKS
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_NAME" \
            --admin \
            --overwrite-existing

      - name: Validar manifiestos Kubernetes
        run: |
          kubectl apply \
            --dry-run=client \
            -f "$MANIFEST_PATH/namespace.yaml"

          kubectl apply \
            --dry-run=client \
            -f "$MANIFEST_PATH/deployment.yaml"

          kubectl apply \
            --dry-run=client \
            -f "$MANIFEST_PATH/service.yaml"

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f "$MANIFEST_PATH/namespace.yaml"
          kubectl apply -f "$MANIFEST_PATH/deployment.yaml"
          kubectl apply -f "$MANIFEST_PATH/service.yaml"

      - name: Actualizar imagen del Deployment
        run: |
          kubectl set image \
            deployment/azure-web-app \
            azure-web-app="$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}" \
            --namespace "$NAMESPACE"

      - name: Verificar despliegue
        run: |
          kubectl rollout status \
            deployment/azure-web-app \
            --namespace "$NAMESPACE" \
            --timeout=300s

          echo "Pods desplegados:"
          kubectl get pods \
            --namespace "$NAMESPACE" \
            -o wide

          echo "Servicios:"
          kubectl get services \
            --namespace "$NAMESPACE"

          echo "Imagen desplegada:"
          kubectl get deployment azure-web-app \
            --namespace "$NAMESPACE" \
            -o jsonpath="{.spec.template.spec.containers[0].image}"

          echo ""

          echo "Historial del Deployment:"
          kubectl rollout history \
            deployment/azure-web-app \
            --namespace "$NAMESPACE"