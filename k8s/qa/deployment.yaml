apiVersion: apps/v1
kind: Deployment

metadata:
  name: azure-web-app
  namespace: web-qa
  labels:
    app: azure-web-app

spec:
  replicas: 1

  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: azure-web-app

  template:
    metadata:
      labels:
        app: azure-web-app

    spec:
      containers:
        - name: azure-web-app
          image: webdeploymentprojectre1.azurecr.io/azure-web-app:6262168e586f016ddcb50e7df718969dfc092f45
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: APP_ENV
              value: "qa"

            - name: APP_VERSION
              value: "1.0.0-qa"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"