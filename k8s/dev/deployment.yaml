apiVersion: apps/v1
kind: Deployment

metadata:
  name: azure-web-app
  namespace: web-dev
  labels:
    app: azure-web-app
    environment: dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: azure-web-app

  template:
    metadata:
      labels:
        app: azure-web-app
        environment: dev

    spec:
      containers:
        - name: azure-web-app
          image: webdeploymentprojectre1.azurecr.io/azure-web-app:v1
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          env:
            - name: APP_ENV
              value: "DEV"

            - name: APP_VERSION
              value: "1.0.0"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3